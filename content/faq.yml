items:
  - question: "How long does the audit take?"
    answer: "60 seconds to request. Full report delivered within 5 business days."
  - question: "Do I need to change my current setup?"
    answer: "No. We simply take over the back-office tasks you want help with."
  - question: "Is this only for big fleets?"
    answer: "No — we work with Icelandic operators running 8–80 vehicles who want practical operational relief and more direct bookings."
  - question: "What if I already have systems in place?"
    answer: "Perfect. We work alongside whatever you’re using and handle the manual work."
