backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Hero"
        name: "hero"
        file: "content/hero.yml"
        fields:
          - {label: "Headline", name: "headline", widget: "string", required: true}
          - {label: "Subheadline", name: "subheadline", widget: "text"}

      - label: "Specialist Focus"
        name: "specialist"
        file: "content/specialist.yml"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}

      - label: "Challenges"
        name: "challenges"
        file: "content/challenges.yml"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - {label: "Icon", name: "icon", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}

      - label: "How FlexOps Works Benefits"
        name: "benefits"
        file: "content/benefits.yml"
        fields:
          - label: "Benefit Items"
            name: "items"
            widget: "list"
            fields:
              - {label: "Text", name: "text", widget: "text"}

      - label: "FAQ"
        name: "faq"
        file: "content/faq.yml"
        fields:
          - label: "FAQ Items"
            name: "items"
            widget: "list"
            fields:
              - {label: "Question", name: "question", widget: "string"}
              - {label: "Answer", name: "answer", widget: "text"}
