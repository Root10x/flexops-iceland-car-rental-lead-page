backend:
  name: git-gateway
  branch: main

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "analytics"
        label: "Analytics"
        file: "content/settings/analytics.yml"
        fields:
          - { label: "Google Analytics 4 ID (G-XXXXXX)", name: "ga4_id", widget: "string" }
          - { label: "Meta Pixel ID", name: "meta_pixel_id", widget: "string" }
          - { label: "GDPR Consent Text", name: "gdpr_text", widget: "text", default: "We use cookies..." }

  - name: "hero"
    label: "Hero"
    file: "content/hero.yml"
    fields:
      - { label: "Headline", name: "headline", widget: "string" }
      - { label: "Subheadline", name: "subheadline", widget: "text" }

  - name: "specialist"
    label: "Specialist Strip"
    file: "content/specialist.yml"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }

publish_mode: simple
display_url: "https://carrentals.flxops.co"
