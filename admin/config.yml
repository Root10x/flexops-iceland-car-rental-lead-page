backend:
  name: git-gateway
  branch: main   # change to your default branch if not main

media_folder: "static/images"
public_folder: "/images"

# Site-wide settings collection
collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings/general.yml"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string", default: "FlexOps | Operational Excellence for Icelandic Car Rental Fleets" }
          - { label: "Site Description", name: "site_description", widget: "text" }
          - { label: "Favicon URL", name: "favicon", widget: "string" }
          - { label: "Logo URL", name: "logo", widget: "string" }
          - { label: "Primary Color", name: "primary_color", widget: "color", default: "#006b5f" }

      - name: "seo"
        label: "SEO & Meta"
        file: "content/settings/seo.yml"
        fields:
          - { label: "Default Meta Title", name: "meta_title", widget: "string" }
          - { label: "Default Meta Description", name: "meta_description", widget: "text" }
          - { label: "Canonical URL", name: "canonical", widget: "string" }
          - { label: "Open Graph Image URL", name: "og_image", widget: "string" }
          - { label: "Robots.txt", name: "robots", widget: "text", default: "User-agent: *\nAllow: /" }

      - name: "analytics"
        label: "Analytics & Tracking"
        file: "content/settings/analytics.yml"
        fields:
          - { label: "Google Analytics 4 ID (G-XXXXXX)", name: "ga4_id", widget: "string" }
          - { label: "Meta Pixel ID", name: "meta_pixel_id", widget: "string" }
          - { label: "LinkedIn Insight ID", name: "linkedin_id", widget: "string" }
          - { label: "X / Twitter Pixel", name: "twitter_pixel", widget: "string" }
          - { label: "Custom Head Scripts (for consent managers etc.)", name: "custom_head", widget: "text", default: "" }
          - { label: "GDPR Consent Banner Text", name: "gdpr_text", widget: "text", default: "We use cookies to improve your experience. By continuing, you agree to our Privacy Policy." }
          - { label: "Privacy Policy URL", name: "privacy_url", widget: "string" }

  # Your existing content collections (expanded)
  - name: "hero"
    label: "Hero Section"
    file: "content/hero.yml"
    fields:
      - { label: "Headline", name: "headline", widget: "string" }
      - { label: "Subheadline", name: "subheadline", widget: "text" }
      - { label: "Background Image URL", name: "bg_image", widget: "string" }

  - name: "specialist"
    label: "Specialist Focus Strip"
    file: "content/specialist.yml"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }

  - name: "challenges"
    label: "Challenges Section"
    file: "content/challenges.yml"
    fields:
      - label: "Items"
        name: "items"
        widget: "list"
        fields:
          - { label: "Icon", name: "icon", widget: "string" }
          - { label: "Text", name: "text", widget: "text" }

  - name: "framework"
    label: "FlexOps Framework"
    file: "content/framework.yml"
    fields:
      - label: "Steps"
        name: "steps"
        widget: "list"
        fields:
          - { label: "Number", name: "number", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Icon", name: "icon", widget: "string" }

  # Add more collections for Comparison, What You Get, FAQ, etc. as needed — I can expand this further.

# Optional: Make admin look more premium (dark mode friendly)
locale: "en"
display_url: "https://carrentals.flxops.co"
logo_url: "https://carrentals.flxops.co/images/logo.png"   # change to your logo

# Publish mode
publish_mode: "simple"
